name: Deploy to WordPress.org
on:
  release:
    types: [published]
jobs:
  tag:
    name: Release New Version ${{  github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: sed -i "s/.*Stable tag.*/Stable tag:\ ${{  github.ref_name }}/" README.txt
      - run: sed -i 's/.*Version.*/Version:\ ${{  github.ref_name }}/' easy-symbols-icons.php

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run Build Script
        run: bash scripts/build.sh

      - name: Remove Development Files
        run: |
          rm -rf ${{ env.pluginSlug }}/.git
          rm -rf ${{ env.pluginSlug }}/.github
          rm -rf ${{ env.pluginSlug }}/.idea
          rm -rf ${{ env.pluginSlug }}/.gitignore
          rm -rf ${{ env.pluginSlug }}/tests
          rm -rf ${{ env.pluginSlug }}/bin
          rm -rf ${{ env.pluginSlug }}/phpunit.*
          rm -rf ${{ env.pluginSlug }}/scripts
          rm -rf ${{ env.pluginSlug }}/package*
          rm -rf ${{ env.pluginSlug }}/composer*

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
