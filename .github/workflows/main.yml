name: Deploy to WordPress.org
on:
  release:
    types: [published]
jobs:
  tag:
    name: Release New Version ${{  github.ref_name }}
    runs-on: ubuntu-latest
    env:
      pluginSlug: 'easy-symbols-icons'
    steps:
      - uses: actions/checkout@v3
      - run: sed -i "s/.*Stable tag.*/Stable tag:\ ${{  github.ref_name }}/" README.txt
      - run: sed -i 's/.*Version.*/Version:\ ${{  github.ref_name }}/' easy-symbols-icons.php

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run Build Script
        run: bash scripts/build.sh

      - name: Remove Development Files
        run: |
          pwd
          rm -rf ./.git
          rm -rf ./.github
          rm -rf ./.idea
          rm -rf ./.gitignore
          rm -rf ./tests
          rm -rf ./bin
          rm -rf ./phpunit.*
          rm -rf ./scripts
          rm -rf ./package*
          rm -rf ./composer*

      - name: Verify final plugin contents
        run: |
          pwd
          find . -maxdepth 3 | sort

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          BUILD_DIR: .
